name: RDP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:

#################################################################
# 1️⃣ Configure Core RDP Settings
#################################################################
    - name: Configure Core RDP Settings
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall delete rule name="RDP-Tailscale"
        netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

#################################################################
# 2️⃣ Create RDP User
#################################################################
    - name: Create RDP User with Secure Password
      run: |
        Add-Type -AssemblyName System.Security
        $charSet = @{
            Upper   = [char[]](65..90)
            Lower   = [char[]](97..122)
            Number  = [char[]](48..57)
            Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126))
        }
        $rawPassword = @()
        $rawPassword += $charSet.Upper | Get-Random -Count 4
        $rawPassword += $charSet.Lower | Get-Random -Count 4
        $rawPassword += $charSet.Number | Get-Random -Count 4
        $rawPassword += $charSet.Special | Get-Random -Count 4
        $password = -join ($rawPassword | Sort-Object { Get-Random })
        $securePass = ConvertTo-SecureString $password -AsPlainText -Force
        $user = Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue
        if (-not $user) {
            New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RDP"
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
        }
        echo "RDP_CREDS=$password" >> $env:GITHUB_ENV

#################################################################
# 3️⃣ Install Tailscale
#################################################################
    - name: Install Tailscale
      run: |
        $url="https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
        $file="$env:TEMP\tailscale.msi"
        Invoke-WebRequest $url -OutFile $file
        Start-Process msiexec.exe -ArgumentList "/i `"$file`" /quiet /norestart" -Wait
        Remove-Item $file -Force

#################################################################
# 4️⃣ Connect Tailscale
#################################################################
    - name: Establish Tailscale Connection
      run: |
        & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-node
        $ip=$null
        for ($i=0;$i -lt 10;$i++){
          $ip=& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          if($ip){break}
          Start-Sleep 5
        }
        if(-not $ip){exit 1}
        echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

#################################################################
# 5.5️⃣ Send Credentials to Telegram
#################################################################
    - name: Send Notification to Telegram
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        RDP_PASS: ${{ env.RDP_CREDS }}
        RDP_IP: ${{ env.TAILSCALE_IP }}
      run: |
        $message = @"
        🚀 <b>New RDP Session Ready</b>

        🌐 <b>IP:</b> <code>$($env:RDP_IP)</code>
        👤 <b>User:</b> <code>RDP</code>
        🔑 <b>Pass:</b> <code>$($env:RDP_PASS)</code>

        <i>Session persistent backup enabled (C: Delta + D: Drive).</i>
        "@
        
        $url = "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage"
        $body = @{
            chat_id = $env:TELEGRAM_CHAT_ID
            text = $message
            parse_mode = "HTML"
        } | ConvertTo-Json

        Invoke-RestMethod -Uri $url -Method Post -ContentType "application/json" -Body $body

#################################################################
# 6️⃣ Install rclone
#################################################################
    - name: Install rclone
      run: |
        Invoke-WebRequest https://downloads.rclone.org/rclone-current-windows-amd64.zip -OutFile rclone.zip
        Expand-Archive rclone.zip -DestinationPath $env:TEMP
        Copy-Item "$env:TEMP\rclone*\rclone.exe" "C:\Windows\System32\rclone.exe"

#################################################################
# 7️⃣ Enhanced Persistence (C: Delta + D: Drive)
#################################################################
    - name: Restore, Run, and Backup
      env:
        RCLONE_CONFIG_MYDRIVE_TYPE: "drive"
        RCLONE_CONFIG_MYDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
        RDP_CREDS: ${{ env.RDP_CREDS }}
      run: |
        $backupDir = "C:\backups"
        if (!(Test-Path $backupDir)) { New-Item $backupDir -ItemType Directory -Force }

        # --- PHASE 1: RESTORE ---
        Write-Host "Checking GDrive for state.zip..."
        $backupExists = rclone lsf mydrive:rdp-backups --max-depth 1 2>$null | Where-Object { $_ -match "state.zip" }

        if ($backupExists) {
            Write-Host "✅ Found State. Downloading..."
            rclone copy mydrive:rdp-backups $backupDir --progress
            rclone deletefile mydrive:rdp-backups/state.zip

            Write-Host "Extracting State..."
            $extractTemp = "C:\extract_temp"
            Expand-Archive -Path "$backupDir\state.zip" -DestinationPath $extractTemp -Force

            # Restore C: Program Files (Delta only - skip existing)
            Write-Host "Restoring Apps..."
            robocopy "$extractTemp\Prog" "C:\Program Files" /E /XJ /R:0 /W:0 /XX
            robocopy "$extractTemp\Prog86" "C:\Program Files (x86)" /E /XJ /R:0 /W:0 /XX
            robocopy "$extractTemp\ProgData" "C:\ProgramData" /E /XJ /R:0 /W:0 /XX
            
            # Restore D: Drive
            if (Test-Path "D:\") {
                robocopy "$extractTemp\DriveD" "D:\" /E /XJ /R:0 /W:0
            }

            # Restore User Profile (Desktop, VSCode, etc.)
            $secStr = ConvertTo-SecureString $env:RDP_CREDS -AsPlainText -Force
            $cred = New-Object System.Management.Automation.PSCredential("RDP", $secStr)
            Start-Job -ScriptBlock { whoami } -Credential $cred | Wait-Job
            $rdpPath = (Get-ChildItem -Path "C:\Users" | Where-Object { $_.Name -like "RDP*" } | Select-Object -First 1).FullName
            robocopy "$extractTemp\User" $rdpPath /E /XJ /R:0 /W:0
        } else {
            Write-Host "ℹ️ No state.zip found. Starting fresh session."
        }

        # --- PHASE 2: KEEP ALIVE & LOOP ---
        $start = Get-Date
        while ($true) {
          $elapsed = (New-TimeSpan -Start $start -End (Get-Date)).TotalMinutes
          Write-Host "RDP Active | Time: $([math]::Round($elapsed, 2)) min"

          if ($elapsed -ge 330) {
            try {
                Write-Host "⏳ Time limit reached. Starting Deep Backup..."
                $packDir = "C:\to_pack"
                New-Item $packDir -ItemType Directory -Force
                
                # 1. Grab User Profile
                $rdpPath = (Get-ChildItem -Path "C:\Users" | Where-Object { $_.Name -like "RDP*" } | Select-Object -First 1).FullName
                robocopy $rdpPath "$packDir\User" /E /XJ /XD "AppData\Local\Temp" "AppData\Local\Microsoft\Windows" /R:0 /W:0
                
                # 2. Grab Program Deltas (Only newer/different files)
                robocopy "C:\Program Files" "$packDir\Prog" /E /XJ /XO /R:0 /W:0
                robocopy "C:\Program Files (x86)" "$packDir\Prog86" /E /XJ /XO /R:0 /W:0
                robocopy "C:\ProgramData" "$packDir\ProgData" /E /XJ /XO /R:0 /W:0
                
                # 3. Grab D: Drive
                if (Test-Path "D:\") {
                    robocopy "D:\" "$packDir\DriveD" /E /XJ /R:0 /W:0
                }

                Write-Host "Zipping everything..."
                Compress-Archive -Path "$packDir\*" -DestinationPath "C:\backups\state.zip" -Force
                
                Write-Host "Uploading to GDrive..."
                rclone copy "C:\backups\state.zip" "mydrive:rdp-backups" --progress
                
                Write-Host "Triggering next workflow..."
                $uri = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches"
                Invoke-RestMethod -Uri $uri -Method POST -Headers @{
                    Authorization = "token $env:GH_PAT"
                    Accept = "application/vnd.github+json"
                } -Body '{"ref":"main"}'
                break
            } catch {
                Write-Host "Error during deep backup: $($_.Exception.Message)"
                exit 1
            }
          }
          Start-Sleep 300
        }

#################################################################
# 8️⃣ Final Notification (Status Update)
#################################################################
    - name: Send Final Status to Telegram
      if: always()
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        $status = "${{ job.status }}"
        $message = "🏁 <b>RDP Session Transitioned</b>`nStatus: <b>$status</b>`n`nDeep Backup (C: Delta + D:) complete. Next loop starting..."
        
        $url = "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage"
        $body = @{
            chat_id = $env:TELEGRAM_CHAT_ID;
            text = $message;
            parse_mode = "HTML"
        } | ConvertTo-Json

        Invoke-RestMethod -Uri $url -Method Post -ContentType "application/json" -Body $body
