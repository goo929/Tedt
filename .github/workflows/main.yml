name: RDP

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:

#################################################################
# 1️⃣ Configure Core RDP Settings
#################################################################
    - name: Configure Core RDP Settings
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                           -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                           -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                           -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall delete rule name="RDP-Tailscale"
        netsh advfirewall firewall add rule name="RDP-Tailscale" `
          dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

#################################################################
# 2️⃣ Create RDP User
#################################################################
    - name: Create RDP User with Secure Password
      run: |
        Add-Type -AssemblyName System.Security

        $charSet = @{
            Upper   = [char[]](65..90)
            Lower   = [char[]](97..122)
            Number  = [char[]](48..57)
            Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126))
        }

        $rawPassword = @()
        $rawPassword += $charSet.Upper | Get-Random -Count 4
        $rawPassword += $charSet.Lower | Get-Random -Count 4
        $rawPassword += $charSet.Number | Get-Random -Count 4
        $rawPassword += $charSet.Special | Get-Random -Count 4

        $password = -join ($rawPassword | Sort-Object { Get-Random })

        $securePass = ConvertTo-SecureString $password -AsPlainText -Force

        $user = Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue

        if (-not $user) {
            New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RDP"
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
        }

        echo "RDP_CREDS=$password" >> $env:GITHUB_ENV

#################################################################
# 3️⃣ Install Tailscale
#################################################################
    - name: Install Tailscale
      run: |
        $url="https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
        $file="$env:TEMP\tailscale.msi"
        Invoke-WebRequest $url -OutFile $file
        Start-Process msiexec.exe -ArgumentList "/i `"$file`" /quiet /norestart" -Wait
        Remove-Item $file -Force

#################################################################
# 4️⃣ Connect Tailscale
#################################################################
    - name: Establish Tailscale Connection
      run: |
        & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-node

        $ip=$null
        for ($i=0;$i -lt 10;$i++){
          $ip=& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          if($ip){break}
          Start-Sleep 5
        }

        if(-not $ip){exit 1}

        echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

#################################################################
# 5️⃣ Verify RDP
#################################################################
    - name: Verify RDP Accessibility
      run: |
        Test-NetConnection $env:TAILSCALE_IP -Port 3389

#################################################################
# 6️⃣ Install rclone
#################################################################
    - name: Install rclone
      run: |
        Invoke-WebRequest https://downloads.rclone.org/rclone-current-windows-amd64.zip -OutFile rclone.zip
        Expand-Archive rclone.zip -DestinationPath $env:TEMP
        Copy-Item "$env:TEMP\rclone*\rclone.exe" "C:\Windows\System32\rclone.exe"

#################################################################
# 7️⃣ Restore Previous Session (✅ FIXED ERROR HANDLING)
#################################################################
    - name: Restore Previous Session
      env:
        GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
      run: |
        # Configure rclone for non-interactive use
        $env:RCLONE_CONFIG_GDRIVE_TYPE = "drive"
        $env:RCLONE_CONFIG_GDRIVE_TOKEN = '${{ secrets.GDRIVE_TOKEN }}'

        Write-Host "Checking for backup directory..."

        # Check if 'rdp-backups' folder exists
        $dirCheck = rclone lsd gdrive: | Where-Object { $_ -match "rdp-backups" }

        if ($dirCheck) {
            Write-Host "Backup directory found. Checking for state.zip..."
            $backupExists = rclone lsf gdrive:rdp-backups --max-depth 1 | Where-Object { $_ -match "state.zip" }

            if ($backupExists) {
                Write-Host "Backup file found. Restoring..."
                if (-not (Test-Path "C:\restore")) { New-Item -Path "C:\restore" -ItemType Directory }
                rclone copy gdrive:rdp-backups C:\restore --progress
                Expand-Archive C:\restore\state.zip -DestinationPath "C:\Users\" -Force
            } else {
                Write-Host "rdp-backups folder exists but state.zip is missing."
            }
        } else {
            Write-Host "No rdp-backups folder found on Drive. This is likely the first run."
        }

#################################################################
# 8️⃣ Lifecycle & Maintain Connection (COMBINED)
#################################################################
    - name: Lifecycle & Maintain Connection
      env:
        GDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
      run: |
        # Configure rclone
        $env:RCLONE_CONFIG_GDRIVE_TYPE = "drive"
        $env:RCLONE_CONFIG_GDRIVE_TOKEN = '${{ secrets.GDRIVE_TOKEN }}'

        $start = Get-Date
        Write-Host "--- RDP SESSION INFO ---"
        Write-Host "RDP Address: rdp-node.tailnet.ts.net"
        Write-Host "Username: RDP"
        Write-Host "Password: $env:RDP_CREDS"
        Write-Host "------------------------"

        while ($true) {
          $now = Get-Date
          $elapsed = ($now - $start).TotalMinutes
          
          # Print Status Heartbeat
          Write-Host "RDP Active | Time Elapsed: $([math]::Round($elapsed, 2)) min | $(Get-Date)"

          # Check if it's time to cycle the runner (at 330 minutes)
          if ($elapsed -ge 330) {
            Write-Host "Time limit reached. Starting migration..."

            # 1️⃣ Create Backup
            Write-Host "Compressing C:\Users\RDP..."
            if (!(Test-Path "C:\Users\RDP")) { New-Item -ItemType Directory -Path "C:\Users\RDP" -Force }
            
            Compress-Archive `
              -Path "C:\Users\RDP" `
              -DestinationPath "C:\state.zip" `
              -Force `
              -ErrorAction SilentlyContinue

            # 2️⃣ Upload to Drive
            Write-Host "Uploading state.zip to Google Drive..."
            rclone copy C:\state.zip gdrive:rdp-backups --progress

            # 3️⃣ Trigger next runner
            Write-Host "Triggering next workflow dispatch..."
            Invoke-RestMethod `
              -Uri "https://api.github.com/repos/${{ github.repository }}/actions/workflows/rdp.yml/dispatches" `
              -Method POST `
              -Headers @{
                Authorization = "token ${{ secrets.GH_PAT }}"
                Accept = "application/vnd.github+json"
              } `
              -Body '{"ref":"main"}'

            Write-Host "Success. Terminating current session."
            break
          }

          # Wait 5 minutes before checking again
          Start-Sleep 300
        }
