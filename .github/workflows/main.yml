name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:

      #################################################################
      # 1️⃣ Configure Core RDP Settings
      #################################################################
      - name: Configure Core RDP Settings
        shell: pwsh
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -Force

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 0 -Force

          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "SecurityLayer" -Value 0 -Force

          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389

          Restart-Service -Name TermService -Force

      #################################################################
      # 2️⃣ Create RDP User
      #################################################################
      - name: Create RDP User with Secure Password
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Security

          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126))
          }

          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4

          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          $user = Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue
          if (-not $user) {
              New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
              Add-LocalGroupMember -Group "Administrators" -Member "RDP"
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          }

          echo "RDP_CREDS=User: RDP | Password: $password" >> $env:GITHUB_ENV

      #################################################################
      # 3️⃣ Install Tailscale
      #################################################################
      - name: Install Tailscale
        shell: pwsh
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"

          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      #################################################################
      # 4️⃣ Establish Tailscale Connection
      #################################################################
      - name: Establish Tailscale Connection
        shell: pwsh
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up `
            --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} `
            --hostname=rdp-node

          $tsIP = $null
          $retries = 0

          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }

          if (-not $tsIP) {
              Write-Error "Tailscale IP not assigned."
              exit 1
          }

          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      #################################################################
      # 5️⃣ Verify RDP Accessibility
      #################################################################
      - name: Verify RDP Accessibility
        shell: pwsh
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"

          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389

          if (-not $testResult.TcpTestSucceeded) {
              Write-Error "TCP connection failed."
              exit 1
          }

          Write-Host "TCP connectivity successful!"

      #################################################################
      # 6️⃣ Install rclone
      #################################################################
      - name: Install rclone
        shell: pwsh
        run: |
          Invoke-WebRequest https://downloads.rclone.org/rclone-current-windows-amd64.zip -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath $env:TEMP
          Copy-Item "$env:TEMP\rclone*\rclone.exe" "C:\Windows\System32\rclone.exe"

      #################################################################
      # 7️⃣ Restore Previous Session
      #################################################################
      - name: Restore Previous Session
        shell: pwsh
        run: |
          $configDir = "$env:APPDATA\rclone"
          New-Item -ItemType Directory -Force -Path $configDir | Out-Null

          $config = @"
[gdrive]
type = drive
scope = drive
token = ${{ secrets.GDRIVE_TOKEN }}
"@

          $config | Out-File "$configDir\rclone.conf" -Encoding ascii

          rclone listremotes
          rclone about gdrive:

          $backupExists = rclone lsf gdrive:rdp-backups --max-depth 1 2>$null |
                          Where-Object { $_ -eq "state.zip" }

          if ($backupExists) {
              Write-Host "Backup found. Restoring..."

              New-Item -ItemType Directory -Force -Path "C:\restore" | Out-Null
              rclone copy gdrive:rdp-backups C:\restore --progress

              Expand-Archive "C:\restore\state.zip" -DestinationPath "C:\Users\" -Force
          }
          else {
              Write-Host "No backup found. Starting fresh."
          }

      #################################################################
      # 8️⃣ Lifecycle Manager (Background)
      #################################################################
      - name: Lifecycle Manager
        shell: pwsh
        run: |
          Start-Job -ScriptBlock {

              $start = Get-Date

              while ($true) {
                  $elapsed = (Get-Date) - $start

                  if ($elapsed.TotalMinutes -ge 330) {

                      Compress-Archive `
                        -Path "C:\Users\RDP" `
                        -DestinationPath "C:\backup.zip" `
                        -Force `
                        -ErrorAction SilentlyContinue

                      rclone copy "C:\backup.zip" gdrive:rdp-backups --progress

                      $repo="${{ github.repository }}"
                      $token="${{ secrets.GH_PAT }}"

                      Invoke-RestMethod `
                        -Uri "https://api.github.com/repos/$repo/actions/workflows/RDP.yml/dispatches" `
                        -Method POST `
                        -Headers @{Authorization="token $token";Accept="application/vnd.github+json"} `
                        -Body '{"ref":"main"}'

                      break
                  }

                  Start-Sleep -Seconds 60
              }
          }

      #################################################################
      # 9️⃣ Maintain Connection
      #################################################################
      - name: Maintain Connection
        shell: pwsh
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: rdp-node.tailnet.ts.net"
          Write-Host "Username: RDP"
          Write-Host "Password: $env:RDP_CREDS"
          Write-Host "==================`n"

          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active"
              Start-Sleep -Seconds 300
          }
