name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:

    ############################################################
    # Configure RDP
    ############################################################
    - name: Configure Core RDP Settings
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
        Restart-Service TermService -Force

    ############################################################
    # Create User
    ############################################################
    - name: Create RDP User
      run: |
        $password = -join ((33..126) | Get-Random -Count 16 | % {[char]$_})
        $secure = ConvertTo-SecureString $password -AsPlainText -Force

        if (-not (Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue)) {
            New-LocalUser -Name "RDP" -Password $secure -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RDP"
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
        }

        echo "RDP_PASS=$password" >> $env:GITHUB_ENV

    ############################################################
    # Install Tailscale
    ############################################################
    - name: Install Tailscale
      run: |
        Invoke-WebRequest https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi -OutFile ts.msi
        Start-Process msiexec.exe -ArgumentList "/i ts.msi /quiet /norestart" -Wait
        & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-node

    ############################################################
    # Install rclone
    ############################################################
    - name: Install rclone
      run: |
        Invoke-WebRequest https://downloads.rclone.org/rclone-current-windows-amd64.zip -OutFile rclone.zip
        Expand-Archive rclone.zip $env:TEMP
        Copy-Item "$env:TEMP\rclone*\rclone.exe" C:\Windows\System32\

    ############################################################
    # Configure rclone (FIXED)
    ############################################################
    - name: Configure rclone
      run: |
        $confDir="$env:APPDATA\rclone"
        New-Item -ItemType Directory -Force -Path $confDir

        @"
[gdrive]
type = drive
token = ${{ secrets.GDRIVE_TOKEN }}
"@ | Out-File "$confDir\rclone.conf" -Encoding utf8

    ############################################################
    # Restore Session
    ############################################################
    - name: Restore Session
      run: |
        $exists = rclone lsf gdrive:rdp-backups --max-depth 1 | Select-String state.zip
        if ($exists) {
            mkdir C:\restore -ea 0
            rclone copy gdrive:rdp-backups C:\restore
            Expand-Archive C:\restore\state.zip C:\Users\RDP -Force -ErrorAction SilentlyContinue
        } else {
            Write-Host "First run — no backup."
        }

    ############################################################
    # Maintain + Lifecycle
    ############################################################
    - name: Maintain Connection
      run: |
        Write-Host "Address: rdp-node.tailnet.ts.net"
        Write-Host "Username: RDP"
        Write-Host "Password: $env:RDP_PASS"

        $start=Get-Date
        $triggered=$false

        while ($true) {

          if(((Get-Date)-$start).TotalMinutes -ge 330 -and -not $triggered){

            Compress-Archive C:\Users\RDP C:\state.zip -Force -ErrorAction SilentlyContinue
            rclone copy C:\state.zip gdrive:rdp-backups

            $repo="${{ github.repository }}"
            Invoke-RestMethod `
              -Uri "https://api.github.com/repos/$repo/actions/workflows/RDP.yml/dispatches" `
              -Method POST `
              -Headers @{Authorization="token ${{ secrets.GH_PAT }}";Accept="application/vnd.github+json"} `
              -Body '{"ref":"main"}'

            $triggered=$true
          }

          $ip=& "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "Heartbeat — $ip"

          Start-Sleep 300
        }
