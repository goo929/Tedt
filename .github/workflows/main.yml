name: RDP-Persistent-Pro

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
#################################################################
# 1️⃣ Configure Core RDP Settings
#################################################################
    - name: Configure Core RDP Settings
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
        netsh advfirewall firewall delete rule name="RDP-Tailscale" 2>$null
        netsh advfirewall firewall add rule name="RDP-Tailscale" dir=in action=allow protocol=TCP localport=3389
        Restart-Service -Name TermService -Force

#################################################################
# 2️⃣ Create RDP User
#################################################################
    - name: Create RDP User
      run: |
        $password = -join ((65..90) + (97..122) + (48..57) + (33..47) | Get-Random -Count 16 | % {[char]$_})
        $securePass = ConvertTo-SecureString $password -AsPlainText -Force
        $user = Get-LocalUser -Name "RDP" -ErrorAction SilentlyContinue
        if (-not $user) {
            New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member "RDP"
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
        }
        echo "RDP_CREDS=$password" >> $env:GITHUB_ENV

#################################################################
# 3️⃣ Install Tailscale & rclone
#################################################################
    - name: Install Tools
      run: |
        $tsUrl="https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
        Invoke-WebRequest $tsUrl -OutFile "tailscale.msi"
        Start-Process msiexec.exe -ArgumentList "/i `"tailscale.msi`" /quiet /norestart" -Wait
        Invoke-WebRequest https://downloads.rclone.org/rclone-current-windows-amd64.zip -OutFile rclone.zip
        Expand-Archive rclone.zip -DestinationPath $env:TEMP
        Copy-Item "$env:TEMP\rclone*\rclone.exe" "C:\Windows\System32\rclone.exe"

#################################################################
# 4️⃣ Connect Tailscale
#################################################################
    - name: Establish Tailscale Connection
      run: |
        & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-node
        Start-Sleep 5
        $ip = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
        echo "TAILSCALE_IP=$ip" >> $env:GITHUB_ENV

#################################################################
# 5️⃣ Restore State (Files + HKLM Registry)
#################################################################
    - name: Restore Previous State
      env:
        RCLONE_CONFIG_MYDRIVE_TYPE: "drive"
        RCLONE_CONFIG_MYDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
      run: |
        $workDir = "D:\persistence_stage"
        if (!(Test-Path $workDir)) { New-Item $workDir -ItemType Directory -Force }
        
        $backupExists = rclone lsf mydrive:rdp-backups --max-depth 1 | Where-Object { $_ -match "state.zip" }
        if ($backupExists) {
            Write-Host "📥 Downloading State..."
            rclone copy mydrive:rdp-backups/state.zip D:\ --progress
            Expand-Archive -Path D:\state.zip -DestinationPath $workDir -Force

            # 1. Restore Files
            robocopy "$workDir\Prog" "C:\Program Files" /E /XJ /R:0 /W:0
            robocopy "$workDir\Prog86" "C:\Program Files (x86)" /E /XJ /R:0 /W:0
            
            # 2. Restore User Profile
            $rdpPath = (Get-ChildItem -Path "C:\Users" | Where-Object { $_.Name -like "RDP*" } | Select-Object -First 1).FullName
            robocopy "$workDir\User" $rdpPath /E /XJ /R:0 /W:0

            # 3. Import HKLM Registry (System-wide Software Registration)
            if (Test-Path "$workDir\Reg\hklm_soft.reg") { 
                Write-Host "Registry Import: HKLM"
                reg import "$workDir\Reg\hklm_soft.reg" 
            }
            
            Write-Host "✅ State Restored."
            rclone deletefile mydrive:rdp-backups/state.zip
        }

#################################################################
# 6️⃣ Notification
#################################################################
    - name: Send Notification
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        $message = "🚀 <b>RDP Ready</b>`n`nIP: <code>$($env:TAILSCALE_IP)</code>`nUser: <code>RDP</code>`nPass: <code>$($env:RDP_CREDS)</code>"
        $body = @{ chat_id=$env:TELEGRAM_CHAT_ID; text=$message; parse_mode="HTML" } | ConvertTo-Json
        Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" -Method Post -ContentType "application/json" -Body $body

#################################################################
# 7️⃣ Persistence Loop (Deep Backup & Absolute Path Filtering)
#################################################################
    - name: Keep Alive and Deep Backup
      env:
        RCLONE_CONFIG_MYDRIVE_TYPE: "drive"
        RCLONE_CONFIG_MYDRIVE_TOKEN: ${{ secrets.GDRIVE_TOKEN }}
        GH_PAT: ${{ secrets.GH_PAT }}
      run: |
        $start = Get-Date
        while ($true) {
          $elapsed = (New-TimeSpan -Start $start -End (Get-Date)).TotalMinutes
          Write-Host "RDP Active: $([math]::Round($elapsed, 2)) min"
          
          if ($elapsed -ge 5) {
            Write-Host "⏳ 5.5 Hours reached. Cleaning and Packing..."
            $stage = "D:\to_pack"
            if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
            New-Item "$stage\Reg" -ItemType Directory -Force

            # 1. Capture HKLM Registry ONLY (Captures System-wide installations)
            reg export "HKLM\SOFTWARE" "$stage\Reg\hklm_soft.reg" /y

            # 2. Exclude List (Folders to IGNORE)
            $excludeProg = @("7-Zip","Amazon","Android","Application Verifier","Azure*","CMake","Common Files","dotnet","Git","GitHub*","Google","Hyper-V","IIS*","ImageMagick*","Internet Explorer","LLVM","Microsoft*","ModifiableWindowsApps","MongoDB","mongosh","Mozilla*","MSBuild","MySQL","nodejs","OpenSSL","PackageManagement","PostgreSQL","PowerShell","R","Reference Assemblies","Tailscale","Unity Hub","VS*Schemas","Windows*")
            $excludeProg86 = @("Android","Application Verifier","Common Files","dotnet","Google","HTML Help Workshop","IIS*","Inno Setup*","Internet Explorer","Microsoft*","Mozilla*","MSBuild","Nuget","Open XML SDK","pipx*","Reference Assemblies","sbt","Visual Studio","Windows*","WiX*","Workflow Manager*")

            # CONVERT TO ABSOLUTE PATHS FOR ROBOCOPY /XD
            $excludeProgPaths = $excludeProg | ForEach-Object { "C:\Program Files\$_" }
            $excludeProg86Paths = $excludeProg86 | ForEach-Object { "C:\Program Files (x86)\$_" }

            # 3. Filtered Backup with Correct /XD Paths
            robocopy "C:\Program Files" "$stage\Prog" /E /XJ /R:0 /W:0 /XD $excludeProgPaths
            robocopy "C:\Program Files (x86)" "$stage\Prog86" /E /XJ /R:0 /W:0 /XD $excludeProg86Paths
            
            $rdpPath = (Get-ChildItem -Path "C:\Users" | Where-Object { $_.Name -like "RDP*" } | Select-Object -First 1).FullName
            robocopy $rdpPath "$stage\User" /E /XJ /R:0 /W:0 /XD "AppData\Local\Temp" "AppData\Local\Microsoft"

            # 4. Final Package & Upload
            Compress-Archive -Path "$stage\*" -DestinationPath "D:\state.zip" -Force
            rclone copy "D:\state.zip" "mydrive:rdp-backups" --progress
            
            # 5. Re-trigger Workflow
            $uri = "https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches"
            Invoke-RestMethod -Uri $uri -Method POST -Headers @{Authorization="token $env:GH_PAT"; Accept="application/vnd.github+json"} -Body '{"ref":"main"}'
            break
          }
          Start-Sleep 300
        }

#################################################################
# 8️⃣ Final Status
#################################################################
    - name: Final Notification
      if: always()
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        $msg = "🏁 Session Transitioned. Status: ${{ job.status }}."
        Invoke-RestMethod -Uri "https://api.telegram.org/bot$($env:TELEGRAM_TOKEN)/sendMessage" -Method Post -Body @{chat_id=$env:TELEGRAM_CHAT_ID; text=$msg}
