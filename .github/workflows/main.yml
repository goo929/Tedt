name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:

      #################################################################
      # 1️⃣ Configure Core RDP Settings
      #################################################################
      - name: Configure Core RDP Settings
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall delete rule name="RDP-Tailscale"
          netsh advfirewall firewall add rule name="RDP-Tailscale" `
            dir=in action=allow protocol=TCP localport=3389
          Restart-Service -Name TermService -Force

      #################################################################
      # 2️⃣ Create RDP User
      #################################################################
      - name: Create RDP User with Secure Password
        run: |
          Add-Type -AssemblyName System.Security
          $charSet = @{
              Upper   = [char[]](65..90)
              Lower   = [char[]](97..122)
              Number  = [char[]](48..57)
              Special = ([char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126))
          }
          $rawPassword = @()
          $rawPassword += $charSet.Upper | Get-Random -Count 4
          $rawPassword += $charSet.Lower | Get-Random -Count 4
          $rawPassword += $charSet.Number | Get-Random -Count 4
          $rawPassword += $charSet.Special | Get-Random -Count 4
          $password = -join ($rawPassword | Sort-Object { Get-Random })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          if (-not (Get-LocalUser -Name "RDP")) {
              New-LocalUser -Name "RDP" -Password $securePass -AccountNeverExpires
              Add-LocalGroupMember -Group "Administrators" -Member "RDP"
              Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"
          }
          echo "RDP_CREDS=User: RDP | Password: $password" >> $env:GITHUB_ENV

      #################################################################
      # 3️⃣ Install Tailscale
      #################################################################
      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          $installerPath = "$env:TEMP\tailscale.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      #################################################################
      # 4️⃣ Establish Tailscale Connection (fixed hostname)
      #################################################################
      - name: Establish Tailscale Connection
        run: |
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=rdp-node
          $tsIP = $null
          $retries = 0
          while (-not $tsIP -and $retries -lt 10) {
              $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $retries++
          }
          if (-not $tsIP) { Write-Error "Tailscale IP not assigned."; exit 1 }
          echo "TAILSCALE_IP=$tsIP" >> $env:GITHUB_ENV

      #################################################################
      # 5️⃣ Verify RDP Accessibility
      #################################################################
      - name: Verify RDP Accessibility
        run: |
          Write-Host "Tailscale IP: $env:TAILSCALE_IP"
          $testResult = Test-NetConnection -ComputerName $env:TAILSCALE_IP -Port 3389
          if (-not $testResult.TcpTestSucceeded) { Write-Error "TCP connection failed."; exit 1 }
          Write-Host "TCP connectivity successful!"

      #################################################################
      # 6️⃣ Install rclone
      #################################################################
      - name: Install rclone
        run: |
          Invoke-WebRequest https://downloads.rclone.org/rclone-current-windows-amd64.zip -OutFile rclone.zip
          Expand-Archive rclone.zip -DestinationPath $env:TEMP
          Copy-Item "$env:TEMP\rclone*\rclone.exe" "C:\Windows\System32\rclone.exe"

      #################################################################
      # 7️⃣ Restore previous session (skip if first run)
      #################################################################
      - name: Restore Previous Session
        run: |
          rclone config create gdrive drive token "${{ secrets.GDRIVE_TOKEN }}"

          # Check if backup exists
          $backupExists = rclone lsf gdrive:rdp-backups --max-depth 1 | Where-Object { $_ -eq "state.zip" }

          if ($backupExists) {
              Write-Host "Backup found. Restoring previous session..."
              if (-not (Test-Path "C:\restore")) { New-Item -Path "C:\restore" -ItemType Directory }
              rclone copy gdrive:rdp-backups C:\restore --progress
              Expand-Archive C:\restore\state.zip C:\Users\ -Force
              Write-Host "Previous session restored."
          } else {
              Write-Host "No backup found. This is the first RDP run. Skipping restore."
          }

      #################################################################
      # 8️⃣ Lifecycle Manager (auto backup + trigger next RDP)
      #################################################################
      - name: Lifecycle Manager
        run: |
          $start = Get-Date
          while ($true) {
              $elapsed = (Get-Date) - $start
              if ($elapsed.TotalMinutes -ge 330) {   # 5h30m
                  Write-Host "Backing up files..."
                  if (-not (Test-Path "C:\Users\RDP")) { New-Item -Path "C:\Users\RDP" -ItemType Directory }
                  Compress-Archive -Path "C:\Users\RDP" -DestinationPath "C:\backup.zip" -Force
                  if (-not (Test-Path "C:\backup")) { New-Item -Path "C:\backup" -ItemType Directory }
                  rclone copy "C:\backup.zip" gdrive:rdp-backups --progress

                  Write-Host "Triggering next RDP..."
                  $repo="${{ github.repository }}"
                  $token="${{ secrets.GH_PAT }}"
                  Invoke-RestMethod -Uri "https://api.github.com/repos/$repo/actions/workflows/RDP.yml/dispatches" `
                                    -Method POST `
                                    -Headers @{Authorization = "token $token"; Accept = "application/vnd.github+json"} `
                                    -Body '{"ref":"main"}'

                  Write-Host "Next RDP triggered. Old RDP will terminate soon."
                  break
              }
              Start-Sleep -Seconds 60
          }

      #################################################################
      # 9️⃣ Show RDP Credentials
      #################################################################
      - name: Show RDP Credentials
        run: |
          Write-Host "`n=== RDP ACCESS ==="
          Write-Host "Address: rdp-node.tailnet.ts.net"
          Write-Host "Username: RDP"
          Write-Host "Password: $(echo $env:RDP_CREDS)"
          Write-Host "==================`n"
